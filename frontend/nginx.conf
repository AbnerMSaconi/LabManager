server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check do Nginx
    location /health.txt {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # 🔹 VIA EXPRESSA PARA O SSE: Desliga o represeamento (Buffer) e mantem a conexão viva
    location /api/v1/events {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 24h;
        proxy_set_header   X-Accel-Buffering no;
        chunked_transfer_encoding on;
    }

    # Proxy para o Keycloak (OIDC discovery e endpoints de autenticação)
    # Host fixo em localhost:8080 para que o issuer do discovery doc bata com
    # o authority configurado no oidcConfig.ts (http://localhost:8080/realms/ucdb)
    location /keycloak/ {
        proxy_pass         http://keycloak:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              localhost:8080;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy para o Backend C# (auth/sync via Keycloak)
    location /api/v1/auth/sync {
        proxy_pass         http://backend-csharp:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy normal para a API FastAPI
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # React SPA — todas as rotas vão para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}