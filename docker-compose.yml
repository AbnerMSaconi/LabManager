services:
  # ── Provedor de Identidade (Simulação do SSO da Instituição) ───────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: always
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: mssql
      KC_DB_URL: "jdbc:sqlserver://db:1433;databaseName=keycloak;trustServerCertificate=true"
      KC_DB_USERNAME: SA
      KC_DB_PASSWORD: ${MSSQL_SA_PASSWORD:-LabManager_2024!}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: "http://localhost:8080"
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - labmanager_net

  # ── Banco de dados Microsoft SQL Server ────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA:        "Y"
      MSSQL_SA_PASSWORD:  ${MSSQL_SA_PASSWORD:-LabManager_2024!}
      MSSQL_PID:          Developer
    volumes:
      - mssql_data:/var/opt/mssql
      - backup_data:/var/opt/mssql/backup
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P '${MSSQL_SA_PASSWORD:-LabManager_2024!}' -C -Q 'SELECT 1' -b || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - labmanager_net

  # ── Init: cria os bancos necessários antes dos serviços subirem ────────────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-LabManager_2024!}
    volumes:
      - ./scripts/init-db.sh:/init-db.sh
    entrypoint: ["/bin/bash", "/init-db.sh"]
    networks:
      - labmanager_net

  # ── Backend ASP.NET Core (C# Minimal APIs) ────────────────────────────────
  backend-csharp:
    build:
      context: ./LabManager.API
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8001"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=labmanager;User Id=SA;Password=${MSSQL_SA_PASSWORD:-LabManager_2024!};TrustServerCertificate=True;"
      Jwt__Key: ${SECRET_KEY:-LabManager-Dev-Secret-Key-2024!!}
      Jwt__Issuer: LabManager
      Jwt__Audience: LabManager
      Jwt__ExpireMinutes: "480"
      Keycloak__Authority: "http://localhost:8080/realms/ucdb"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/ucdb/.well-known/openid-configuration"
      Keycloak__Audience: "account"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - labmanager_net

  # ── Frontend React + Nginx ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend-csharp:
        condition: service_healthy
    networks:
      - labmanager_net

volumes:
  mssql_data:
  backup_data:

networks:
  labmanager_net:
    driver: bridge