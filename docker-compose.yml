services:

  # ── Banco de dados Microsoft SQL Server ────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    environment:
      ACCEPT_EULA:        "Y"
      MSSQL_SA_PASSWORD:  ${MSSQL_SA_PASSWORD:-LabManager_2024!}
      MSSQL_PID:          Developer
    volumes:
      - mssql_data:/var/opt/mssql
      - backup_data:/var/opt/mssql/backup
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P '${MSSQL_SA_PASSWORD:-LabManager_2024!}' -C -Q 'SELECT 1' -b || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - labmanager_net

  # ── Backend FastAPI + Gunicorn ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL:                  mssql+pyodbc://SA:${MSSQL_SA_PASSWORD:-LabManager_2024!}@db:1433/labmanager?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
      SECRET_KEY:                    ${SECRET_KEY:-TROQUE-ESTA-CHAVE-EM-PRODUCAO}
      ALGORITHM:                     HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:   ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"
    volumes:
      - ./:/app
      - backup_data:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - labmanager_net

  # ── Frontend React + Nginx ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - labmanager_net

volumes:
  mssql_data:
  backup_data:

networks:
  labmanager_net:
    driver: bridge
